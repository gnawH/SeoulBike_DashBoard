<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul Bike Dashboard</title>

    <!-- FontAwesome & Fonts -->
    <script>
        window.FontAwesomeConfig = { autoReplaceSvg: 'nest' };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-3.1.1.min.js"></script>
    <!-- WordCloud2.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>

    <!-- Tailwind CSS & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        bike: { green: '#32C358', light: '#EAF8EE', dark: '#1E293B', gray: '#F3F4F6', text: '#475569' }
                    },
                    backgroundImage: {
                        'mesh': 'radial-gradient(at 0% 0%, rgba(50, 195, 88, 0.05) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(50, 195, 88, 0.05) 0px, transparent 50%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8FAFC;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- WebSocket & Stomp -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body class="m-0 p-0 font-sans text-bike-text bg-[#F8FAFC] min-h-screen flex flex-col bg-mesh">

    <!-- Notification Toast -->
    <div id="notificationToast"
        class="fixed top-8 right-8 z-[100] transform translate-x-[120%] transition-transform duration-500 pointer-events-none">
        <div
            class="bg-white border-l-4 border-bike-green shadow-[0_8px_30px_rgba(0,0,0,0.12)] rounded-xl p-5 flex items-center gap-4 min-w-[320px] border border-slate-100">
            <div
                class="w-12 h-12 rounded-full bg-bike-light flex items-center justify-center text-bike-green shadow-sm">
                <i class="fa-solid fa-bell-concierge text-lg"></i>
            </div>
            <div class="flex-1">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">System Notification</p>
                <p id="toastMessage" class="text-sm text-slate-700 font-semibold leading-relaxed">알림 메시지 내용</p>
            </div>
            <button onclick="hideToast()"
                class="text-slate-300 hover:text-slate-500 transition-colors p-1 pointer-events-auto">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>
    </div>

    <!-- 회원일 때 (세션에 loginUser 객체가 존재할 경우) -->
    <th:block th:if="${session.loginUser != null}">
        <div th:replace="~{dashboard/user :: content}"></div>
    </th:block>

    <!-- 비회원일 때 (세션에 loginUser 객체가 없을 경우) -->
    <th:block th:unless="${session.loginUser != null}">
        <div th:replace="~{dashboard/guest :: content}"></div>
    </th:block>

    <script th:inline="javascript">
        let stompClient = null;
        const IS_LOGGED_IN = /*[[${session.loginUser != null}]]*/ false;

        // Idle logout preset: uncomment one line below
        // const IDLE_TIMEOUT_MS = 15 * 60 * 1000; // 15 minutes
        const IDLE_TIMEOUT_MS = 30 * 60 * 1000; // 30 minutes
        let idleTimerId = null;

        function scheduleIdleLogout() {
            if (!IS_LOGGED_IN) return;
            if (idleTimerId) {
                clearTimeout(idleTimerId);
            }
            idleTimerId = setTimeout(() => {
                window.location.href = '/logout';
            }, IDLE_TIMEOUT_MS);
        }

        function bindIdleActivityEvents() {
            if (!IS_LOGGED_IN) return;
            const activityEvents = ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'];
            activityEvents.forEach((eventName) => {
                window.addEventListener(eventName, scheduleIdleLogout, { passive: true });
            });
            scheduleIdleLogout();
        }

        function connectWebSocket() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null; // Disable debug logging in console

            stompClient.connect({}, function (frame) {
                console.log('Connected to WebSocket: ' + frame);
                stompClient.subscribe('/topic/notifications', function (notification) {
                    showToast(notification.body);
                });
            }, function (error) {
                console.error('WebSocket connection error:', error);
                setTimeout(connectWebSocket, 5000); // Reconnect after 5 seconds
            });
        }

        function showToast(message) {
            const toast = document.getElementById('notificationToast');
            const msgEl = document.getElementById('toastMessage');
            msgEl.innerText = message;

            toast.classList.remove('translate-x-[120%]');
            toast.classList.add('translate-x-0');

            // Auto-hide after 5 seconds
            setTimeout(hideToast, 5000);
        }

        function hideToast() {
            const toast = document.getElementById('notificationToast');
            if (toast) {
                toast.classList.remove('translate-x-0');
                toast.classList.add('translate-x-[120%]');
            }
        }

        // Initialize connection
        window.addEventListener('load', connectWebSocket);
        window.addEventListener('load', bindIdleActivityEvents);
    </script>
</body>

</html>
