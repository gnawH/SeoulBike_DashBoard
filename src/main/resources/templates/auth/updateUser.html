<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul Bike - Update Profile</title>

    <!-- FontAwesome & Fonts -->
    <script>window.FontAwesomeConfig = { autoReplaceSvg: 'nest' };</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Tailwind CSS & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        bike: { green: '#32C358', light: '#EAF8EE', dark: '#1E293B', gray: '#F3F4F6', text: '#475569' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8FAFC;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="min-h-screen flex text-slate-800 font-sans antialiased selection:bg-bike-green selection:text-white">

    <!-- Left Side: Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 bg-white relative overflow-y-auto">
        <!-- Back Button -->
        <button type="button" onclick="history.back()"
            class="absolute top-8 left-8 text-slate-400 hover:text-bike-green transition-colors flex items-center gap-2 text-sm font-medium z-10 bg-white/80 px-2 py-1 rounded backdrop-blur focus:outline-none">
            <i class="fa-solid fa-arrow-left"></i> 돌아가기
        </button>

        <div class="w-full max-w-sm mt-12 mb-8">
            <div class="mb-10">
                <div class="flex items-center gap-3 mb-4">
                    <div
                        class="w-10 h-10 bg-bike-green rounded-xl flex items-center justify-center text-white shadow-[0_4px_12px_rgba(50,195,88,0.3)]">
                        <i class="fa-solid fa-user-pen text-lg"></i>
                    </div>
                </div>
                <h2 class="text-3xl font-bold text-slate-900 mb-2 tracking-tight">회원정보 수정</h2>
                <p class="text-sm text-slate-500 font-medium">계정 정보를 확인하고 수정할 수 있습니다.</p>
            </div>

            <form action="/auth/update" method="post" class="space-y-4">

                <div>
                    <label for="name" class="block text-sm font-bold text-slate-700 mb-1.5"><span
                            class="text-red-500 mr-1">*</span>이름</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-user text-slate-300"></i>
                        </div>
                        <input type="text" id="name" name="name" placeholder="홍길동"
                            class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-bike-green focus:border-transparent transition-all font-medium"
                            required>
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700 mb-1.5"><span
                            class="text-red-500 mr-1">*</span>새로운 비밀번호</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-300"></i>
                        </div>
                        <input type="password" id="password" name="password" placeholder="영문 대/소문자, 숫자, 특수문자 포함"
                            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).+"
                            title="비밀번호는 영문 대문자, 소문자, 숫자, 특수문자를 모두 포함해야 합니다."
                            class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-bike-green focus:border-transparent transition-all font-medium"
                            required>
                    </div>
                    <p id="password-hint" class="text-xs text-slate-500 mt-1.5 ml-1"><i
                            class="fa-solid fa-circle-info mr-1"></i>영문 대/소문자, 숫자, 특수문자를 모두 포함해야 합니다.</p>
                </div>

                <div>
                    <label for="password_confirm" class="block text-sm font-bold text-slate-700 mb-1.5"><span
                            class="text-red-500 mr-1">*</span>비밀번호 확인</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-circle-check text-slate-300"></i>
                        </div>
                        <input type="password" id="password_confirm" name="password_confirm"
                            placeholder="위 비밀번호와 동일하게 입력" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).+"
                            title="비밀번호는 영문 대문자, 소문자, 숫자, 특수문자를 모두 포함해야 합니다."
                            class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-bike-green focus:border-transparent transition-all font-medium"
                            required>
                    </div>
                    <p id="password-confirm-hint" class="text-xs text-slate-500 mt-1.5 ml-1 hidden"><i
                            class="fa-solid fa-circle-info mr-1"></i></p>
                </div>

                <div>
                    <label for="email" class="block text-sm font-bold text-slate-700 mb-1.5"><span
                            class="text-red-500 mr-1">*</span>이메일</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-slate-300"></i>
                        </div>
                        <input type="email" id="email" name="email" placeholder="seoulbike@example.com"
                            class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-bike-green focus:border-transparent transition-all font-medium"
                            required>
                    </div>
                </div>

                <div>
                    <label for="region" class="block text-sm font-bold text-slate-700 mb-1.5"><span
                            class="text-red-500 mr-1">*</span>관할 지역 (소속구)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-map-location-dot text-slate-300"></i>
                        </div>
                        <select id="region" name="region" required
                            class="block w-full pl-11 pr-8 py-3 bg-slate-50 text-slate-700 border border-slate-200 rounded-xl text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-bike-green focus:border-transparent transition-all font-medium appearance-none cursor-pointer">
                            <option value="" disabled selected>담당 지역을 선택하세요</option>
                            <option value="강남구">강남구</option>
                            <option value="강동구">강동구</option>
                            <option value="강북구">강북구</option>
                            <option value="강서구">강서구</option>
                            <option value="관악구">관악구</option>
                            <option value="광진구">광진구</option>
                            <option value="구로구">구로구</option>
                            <option value="금천구">금천구</option>
                            <option value="노원구">노원구</option>
                            <option value="도봉구">도봉구</option>
                            <option value="동대문구">동대문구</option>
                            <option value="동작구">동작구</option>
                            <option value="마포구">마포구</option>
                            <option value="서대문구">서대문구</option>
                            <option value="서초구">서초구</option>
                            <option value="성동구">성동구</option>
                            <option value="성북구">성북구</option>
                            <option value="송파구">송파구</option>
                            <option value="양천구">양천구</option>
                            <option value="영등포구">영등포구</option>
                            <option value="용산구">용산구</option>
                            <option value="은평구">은평구</option>
                            <option value="종로구">종로구</option>
                            <option value="중구">중구</option>
                            <option value="중랑구">중랑구</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-chevron-down text-slate-400 text-xs"></i>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit"
                        class="w-full flex justify-center items-center gap-2 py-3.5 px-4 border border-transparent rounded-xl shadow-[0_4px_12px_rgba(50,195,88,0.3)] text-sm font-bold text-white bg-bike-green hover:bg-green-600 focus:outline-none focus:ring-4 focus:ring-green-100 transition-all transform hover:-translate-y-0.5">
                        수정 완료
                    </button>
                    <button type="button" onclick="openDeleteModal()"
                        class="w-full mt-3 flex justify-center items-center gap-2 py-3.5 px-4 border border-slate-200 rounded-xl text-sm font-bold text-slate-500 bg-white hover:bg-slate-50 hover:text-red-500 focus:outline-none transition-all">
                        회원 탈퇴
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Account Modal -->
    <div id="deleteModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity opacity-0"
            id="deleteModalBackdrop"></div>
        <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md transform scale-95 opacity-0 transition-opacity transition-transform duration-300 relative overflow-hidden"
                id="deleteModalPanel">
                <!-- Header -->
                <div class="px-6 py-5 border-b border-slate-100 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800">회원 탈퇴</h3>
                </div>

                <form action="/" method="post">
                    <!-- Body -->
                    <div class="p-6">
                        <p class="text-sm text-slate-600 mb-4 font-medium">안전한 탈퇴 처리를 위해 현재 비밀번호를 다시 한번 입력해 주세요. 탈퇴 시 모든
                            데이터가 삭제되며 복구할 수 없습니다.</p>

                        <div>
                            <label for="delete_password" class="block text-sm font-bold text-slate-700 mb-1.5"><span
                                    class="text-red-500 mr-1">*</span>비밀번호 확인</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-lock text-slate-300"></i>
                                </div>
                                <input type="password" id="delete_password" name="password" placeholder="현재 비밀번호 입력"
                                    class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all font-medium"
                                    required>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="bg-slate-50 px-6 py-4 flex justify-end gap-3 rounded-b-2xl">
                        <button type="button" onclick="closeDeleteModal()"
                            class="px-5 py-2.5 text-sm font-bold text-slate-600 hover:bg-slate-200 bg-slate-100 rounded-lg transition-colors focus:outline-none">
                            취소
                        </button>
                        <button type="submit"
                            class="px-5 py-2.5 text-sm font-bold text-white bg-red-500 hover:bg-red-600 rounded-lg shadow-[0_4px_12px_rgba(239,68,68,0.3)] transition-colors focus:outline-none focus:ring-4 focus:ring-red-100">
                            탈퇴하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Right Side: Image/Branding Background -->
    <div class="hidden lg:flex lg:w-1/2 relative bg-slate-900 justify-center items-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <!-- Professional Work Environment Image -->
            <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?q=80&w=2070&auto=format&fit=crop"
                alt="Workspace" class="w-full h-full object-cover opacity-50">
            <div class="absolute inset-0 bg-gradient-to-t from-bike-dark via-transparent to-bike-dark/30"></div>
        </div>

        <div class="relative z-10 p-12 text-left text-white max-w-lg mt-auto mb-16">
            <h1 class="text-4xl font-bold mb-4 tracking-tight leading-tight">정확한 정보 관리는<br>신뢰받는 행정의 기본입니다.</h1>
            <p class="text-lg text-slate-200 leading-relaxed font-medium mb-8">
                계정 정보를 안전하게 최신화하여 원활하게 대시보드를 관리하세요.<br>
                주기적인 비밀번호 변경은 보안을 강력하게 유지합니다.
            </p>
        </div>
    </div>

    <!-- UI Validation Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const passwordInput = document.getElementById('password');
            const passwordHint = document.getElementById('password-hint');

            const passwordConfirmInput = document.getElementById('password_confirm');
            const passwordConfirmHint = document.getElementById('password-confirm-hint');

            function updateHintStyle(isValid, hintElement, inputElement, defaultText) {
                if (inputElement.value.length === 0) {
                    hintElement.className = "text-xs text-slate-500 mt-1.5 ml-1";
                    hintElement.innerHTML = `<i class="fa-solid fa-circle-info mr-1"></i>${defaultText}`;
                    inputElement.classList.remove('border-red-500', 'ring-red-500', 'border-bike-green', 'ring-bike-green');
                    return;
                }

                if (isValid) {
                    hintElement.className = "text-xs text-bike-green mt-1.5 ml-1";
                    hintElement.innerHTML = '<i class="fa-solid fa-circle-check mr-1"></i>조건을 만족합니다.';
                    inputElement.classList.remove('border-red-500', 'ring-red-500');
                    inputElement.classList.add('border-bike-green', 'ring-bike-green');
                } else {
                    hintElement.className = "text-xs text-red-500 mt-1.5 ml-1";
                    hintElement.innerHTML = `<i class="fa-solid fa-circle-xmark mr-1"></i>${defaultText}`;
                    inputElement.classList.remove('border-bike-green', 'ring-bike-green');
                    inputElement.classList.add('border-red-500', 'ring-red-500');
                }
            }

            if (passwordInput) {
                passwordInput.addEventListener('blur', function () {
                    const isValid = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).+$/.test(this.value);
                    updateHintStyle(isValid, passwordHint, this, '영문 대/소문자, 숫자, 특수문자를 모두 포함해야 합니다.');
                    if (passwordConfirmInput.value.length > 0) checkPasswordMatch();
                });
            }

            function checkPasswordMatch() {
                if (passwordConfirmInput.value.length === 0) {
                    passwordConfirmHint.classList.add('hidden');
                    passwordConfirmInput.classList.remove('border-red-500', 'ring-red-500', 'border-bike-green', 'ring-bike-green');
                    return;
                }
                passwordConfirmHint.classList.remove('hidden');
                if (passwordInput.value === passwordConfirmInput.value) {
                    passwordConfirmHint.className = "text-xs text-bike-green mt-1.5 ml-1";
                    passwordConfirmHint.innerHTML = '<i class="fa-solid fa-circle-check mr-1"></i>비밀번호가 일치합니다.';
                    passwordConfirmInput.classList.remove('border-red-500', 'ring-red-500');
                    passwordConfirmInput.classList.add('border-bike-green', 'ring-bike-green');
                } else {
                    passwordConfirmHint.className = "text-xs text-red-500 mt-1.5 ml-1";
                    passwordConfirmHint.innerHTML = '<i class="fa-solid fa-circle-xmark mr-1"></i>비밀번호가 서로 일치하지 않습니다.';
                    passwordConfirmInput.classList.remove('border-bike-green', 'ring-bike-green');
                    passwordConfirmInput.classList.add('border-red-500', 'ring-red-500');
                }
            }

            if (passwordConfirmInput) {
                passwordConfirmInput.addEventListener('blur', checkPasswordMatch);
            }

            // Modal Logic
            window.openDeleteModal = function () {
                const modal = document.getElementById('deleteModal');
                const backdrop = document.getElementById('deleteModalBackdrop');
                const panel = document.getElementById('deleteModalPanel');

                modal.classList.remove('hidden');
                // Allow browser to render display:block before transitioning opacity
                setTimeout(() => {
                    backdrop.classList.remove('opacity-0');
                    panel.classList.remove('opacity-0', 'scale-95');
                    panel.classList.add('opacity-100', 'scale-100');
                }, 10);
            };

            window.closeDeleteModal = function () {
                const modal = document.getElementById('deleteModal');
                const backdrop = document.getElementById('deleteModalBackdrop');
                const panel = document.getElementById('deleteModalPanel');

                backdrop.classList.add('opacity-0');
                panel.classList.remove('opacity-100', 'scale-100');
                panel.classList.add('opacity-0', 'scale-95');

                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300); // Matches Tailwind transition duration (300ms)
            };
        });
    </script>
</body>

</html>
